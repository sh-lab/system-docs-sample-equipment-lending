<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{screen.duplicate-submit-error.title}">screen.duplicate-submit-error.title</title>
    <link rel="stylesheet" th:href="@{/css/business-common.css}">
</head>
<body class="business-screen">
<div th:replace="~{fragments/fragment-hfp-el-common :: hfp_el_header_with_page_title(#{screen.duplicate-submit-error.title})}"></div>

<main class="business-main">
    <p class="business-message business-message--error"
       th:if="${errorMessage != null}"
       th:text="${errorMessage}">errorMessage</p>

    <h1 class="business-page-title" th:text="#{screen.duplicate-submit-error.title}">screen.duplicate-submit-error.title</h1>
    <p class="business-note" th:text="#{screen.duplicate-submit-error.description}">screen.duplicate-submit-error.description</p>

    <div class="business-action-row business-action-row--right">
        <form method="get" th:action="@{${homePath}}">
            <button class="business-button" th:text="#{screen.duplicate-submit-error.back-to-mypage}" type="submit">screen.duplicate-submit-error.back-to-mypage</button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/fragment-hfp-el-common :: hfp_el_footer}"></div>
</body>
</html>
