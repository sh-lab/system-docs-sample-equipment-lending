<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{screen.elv600.title}">screen.elv600.title</title>
    <link rel="stylesheet" th:href="@{/css/business-common.css}">
</head>
<body class="business-screen">
<div th:replace="~{fragments/fragment-hfp-el-common :: hfp_el_header_with_page_title(#{screen.elv600.title})}"></div>
<main class="business-main">
    <p class="business-message business-message--warning" th:if="${warningMessage != null}" th:text="${warningMessage}">warning</p>
    <p class="business-message business-message--error" th:if="${errorMessage != null}" th:text="${errorMessage}">error</p>
    <p class="business-message business-message--info" th:if="${infoMessage != null}" th:text="${infoMessage}">info</p>
    <h1 class="business-page-title" th:text="#{screen.elv600.title}">screen.elv600.title</h1>

    <section class="business-section">
        <h2 class="business-section__title" th:text="#{screen.elv600.search-conditions}">screen.elv600.search-conditions</h2>
        <form class="business-search-form" method="get" th:action="@{/hfp-elv600-admin-equipment-search}">
            <div class="business-search-form__row">
                <div class="business-search-field">
                    <label class="business-search-field__label" for="equipmentName" th:text="#{screen.elv300.equipment-name}">name</label>
                    <input class="business-search-field__control" id="equipmentName" name="equipmentName" th:value="${equipmentName}" type="text">
                </div>
                <div class="business-search-field">
                    <label class="business-search-field__label" for="equipmentType" th:text="#{screen.elv300.equipment-type}">type</label>
                    <select class="business-search-field__control" id="equipmentType" name="equipmentType">
                        <option value="" th:text="#{screen.elv600.status-all}">all</option>
                        <option th:each="option : ${equipmentTypeOptions}" th:value="${option.value()}" th:text="${option.label()}" th:selected="${option.value() == equipmentType}">type</option>
                    </select>
                </div>
                <div class="business-search-field">
                    <label class="business-search-field__label" for="statusCode" th:text="#{screen.elv600.equipment-status}">status</label>
                    <select class="business-search-field__control" id="statusCode" name="statusCode">
                        <option th:each="option : ${statusOptions}" th:value="${option.value()}" th:text="${option.label()}" th:selected="${option.value() == statusCode}">status</option>
                    </select>
                </div>
            </div>
            <div class="business-search-form__row">
                <div class="business-search-field">
                    <label class="business-search-field__label" for="systemRegisteredDateFrom" th:text="#{screen.elv600.system-registered-date-from}">date from</label>
                    <input class="business-search-field__control" id="systemRegisteredDateFrom" name="systemRegisteredDateFrom" th:value="${systemRegisteredDateFrom}" type="date">
                </div>
                <div class="business-search-field">
                    <label class="business-search-field__label" for="systemRegisteredDateTo" th:text="#{screen.elv600.system-registered-date-to}">date to</label>
                    <input class="business-search-field__control" id="systemRegisteredDateTo" name="systemRegisteredDateTo" th:value="${systemRegisteredDateTo}" type="date">
                </div>
            </div>
            <div class="business-search-form__row business-search-form__row--actions">
                <button class="business-button" th:text="#{label.search}" type="submit">search</button>
            </div>
        </form>
    </section>

    <section class="business-section">
        <h2 class="business-section__title" th:text="#{screen.elv600.result-list}">screen.elv600.result-list</h2>
        <table class="business-table" th:if="${!#lists.isEmpty(equipmentItems)}">
            <thead>
            <tr>
                <th th:text="#{screen.elv600.edit}">edit</th>
                <th th:text="#{label.equipment-code}">code</th>
                <th th:text="#{screen.elv300.equipment-name}">name</th>
                <th th:text="#{screen.elv300.equipment-type}">type</th>
                <th th:text="#{screen.elv600.system-registered-date}">date</th>
                <th th:text="#{label.storage-location}">location</th>
                <th th:text="#{screen.elv600.equipment-status}">status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="equipmentItem : ${equipmentItems}">
                <td>
                    <form method="get" th:action="@{/hfp-elv700-admin-equipment-edit}">
                        <input type="hidden" name="mode" value="edit">
                        <input type="hidden" name="equipmentId" th:value="${equipmentItem.equipmentId()}">
                        <button class="business-button" th:text="#{screen.elv600.edit}" type="submit">edit</button>
                    </form>
                </td>
                <td th:text="${equipmentItem.equipmentCode()}">EQ-0001</td>
                <td th:text="${equipmentItem.equipmentName()}">name</td>
                <td th:text="${equipmentItem.equipmentTypeLabel()}">type</td>
                <td th:text="${equipmentItem.systemRegisteredDate()}">2026-01-01</td>
                <td th:text="${equipmentItem.storageLocation()}">storage</td>
                <td th:text="${equipmentItem.statusLabel()}">status</td>
            </tr>
            </tbody>
        </table>
    </section>

    <div class="business-action-row">
        <form method="get" th:action="@{/hfp-elv200-admin-mypage}">
            <button class="business-button business-button--secondary" th:text="#{screen.elv600.back-to-mypage}" type="submit">back</button>
        </form>
        <form method="get" th:action="@{/hfp-elv700-admin-equipment-edit}">
            <input type="hidden" name="mode" value="create">
            <button class="business-button" th:text="#{screen.elv600.new-equipment}" type="submit">new</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/fragment-hfp-el-common :: hfp_el_footer}"></div>
</body>
</html>
