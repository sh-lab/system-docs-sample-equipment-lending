spring.application.name=equipment-lending
spring.thymeleaf.cache=false
spring.datasource.url=jdbc:h2:mem:equipment-lending;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.messages.basename=i18n/labels,i18n/message
spring.messages.encoding=UTF-8
spring.web.locale=ja
spring.web.locale-resolver=fixed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
